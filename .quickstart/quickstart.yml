database_key: salesforce_database
schema_key: salesforce_schema

dbt_versions: ">=1.3.0 <3.0.0"

table_variables:
  salesforce__user_role_enabled:
    - UserRole
  salesforce__lead_enabled:
    - Lead
  salesforce__event_enabled:
    - Event
  salesforce__task_enabled:
    - Task
  salesforce__opportunity_line_item_enabled:
    - OpportunityLineItem
  salesforce__order_enabled:
    - Order
  salesforce__product_2_enabled:
    - Product2

destination_configurations:
  databricks:
    dispatch:
      - macro_namespace: dbt_utils
        search_order: [ 'spark_utils', 'dbt_utils' ]
public_models: [
  "salesforce__contact_enhanced",
  "salesforce__daily_activity",
  "salesforce__manager_performance",
  "salesforce__opportunity_enhanced",
  "salesforce__opportunity_line_item_enhanced",
  "salesforce__owner_performance",
  "salesforce__sales_snapshot"
]

supported_vars:
  salesforce__account_pass_through_columns:
    type: dictionary
    description: "Additional `ACCOUNT` columns to include in `salesforce__opportunity_enhanced` and `salesforce__contact_enhanced`"
    display_name: "Additional Account Columns"

  salesforce__contact_pass_through_columns:
    type: dictionary
    description: "Additional `CONTACT` columns to include in `salesforce__contact_enhanced`"
    display_name: "Additional Contact Columns"

  salesforce__opportunity_pass_through_columns:
    type: dictionary
    description: "Additional `OPPORTUNITY` columns to include in `salesforce__opportunity_enhanced`"
    display_name: "Additional Opportunity Columns"

  salesforce__opportunity_line_item_pass_through_columns:
    type: dictionary
    description: "Additional `OPPORTUNITY_LINE_ITEM` columns to include in `salesforce__opportunity_line_item_enhanced`"
    display_name: "Additional Opportunity Line Item Columns"

  salesforce__product_2_pass_through_columns:
    type: dictionary
    description: "Additional `PRODUCT_2` columns to include in `salesforce__opportunity_line_item_enhanced`"
    display_name: "Additional Product_2 Columns"

  salesforce__user_role_pass_through_columns:
    type: dictionary
    description: "Additional `USER_ROLE` columns to include in `salesforce__opportunity_enhanced`"
    display_name: "Additional User Role Columns"

  salesforce__user_pass_through_columns:
    type: dictionary
    description: "Additional `USER` columns to include in `salesforce__opportunity_enhanced` and `salesforce__contact_enhanced`"
    display_name: "Additional User Columns"

