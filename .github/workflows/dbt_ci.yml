name: dbt CI — Validate on DEV

on:
  pull_request:
    branches: [main]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'tests/**'
      - 'seeds/**'
      - 'dbt_project.yml'
      - 'packages.yml'

env:
  DBT_PROFILES_DIR: .
  DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  DBT_SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE_DEV }}
  DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE_DEV }}
  DBT_SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE_DEV }}
  DBT_SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  DBT_SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  DBT_SNOWFLAKE_SCHEMA: 'dbt_ci_pr${{ github.event.pull_request.number }}'

jobs:
  dbt-ci:
    name: dbt build (DEV)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-snowflake
        run: |
          pip install --upgrade pip
          pip install dbt-snowflake==1.8.*

      - name: Generate profiles.yml
        run: |
          cat > profiles.yml <<EOF
          dbt_salesforce:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "{{ env_var('DBT_SNOWFLAKE_ACCOUNT') }}"
                user: "{{ env_var('DBT_SNOWFLAKE_USER') }}"
                password: "{{ env_var('DBT_SNOWFLAKE_PASSWORD') }}"
                role: "{{ env_var('DBT_SNOWFLAKE_ROLE') }}"
                database: "{{ env_var('DBT_SNOWFLAKE_DATABASE') }}"
                warehouse: "{{ env_var('DBT_SNOWFLAKE_WAREHOUSE') }}"
                schema: "{{ env_var('DBT_SNOWFLAKE_SCHEMA') }}"
                threads: 4
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt build
        run: dbt build --full-refresh --target dev

      - name: Comment results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '### dbt CI Results\n\n';
            const resultsPath = 'target/run_results.json';
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const passed = results.results.filter(r => r.status === 'pass').length;
              const failed = results.results.filter(r => r.status === 'error' || r.status === 'fail').length;
              summary += `| Status | Count |\n|--------|-------|\n`;
              summary += `| ✅ Passed | ${passed} |\n`;
              summary += `| ❌ Failed | ${failed} |\n`;
              const failures = results.results.filter(r => r.status === 'error' || r.status === 'fail');
              if (failures.length > 0) {
                summary += `\n**Failures:**\n`;
                failures.forEach(f => {
                  summary += `- \`${f.unique_id}\`: ${f.message?.substring(0, 200) || 'No message'}\n`;
                });
              }
            } else {
              summary += '⚠️ No run results found. Check workflow logs.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Drop CI schema
        if: always()
        run: |
          dbt run-operation drop_schema \
            --args "{schema_name: ${{ env.DBT_SNOWFLAKE_SCHEMA }}}" \
            --target dev || echo "Schema cleanup skipped"